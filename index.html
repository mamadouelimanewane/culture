<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Culture Sénégal — Carte des Infrastructures Culturelles</title>
  <meta name="description" content="Explorez les infrastructures culturelles et centres de formation aux arts et métiers du Sénégal" />
  <meta name="theme-color" content="#1a6b3e" />

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <!-- Leaflet Routing Machine -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="header" id="header">
    <div class="header-inner container">
      <!-- Logo -->
      <a class="logo" href="#">
        <span class="logo-emblem">🌍</span>
        <div class="logo-text">
          <span class="logo-title">Culture Sénégal</span>
          <span class="logo-sub">Carte Culturelle Nationale</span>
        </div>
      </a>

      <!-- Desktop nav tabs -->
      <nav class="nav-tabs" id="navTabs" role="tablist">
        <button class="nav-tab active" data-tab="infrastructures" role="tab" aria-selected="true">
          <span class="tab-icon">🏛</span>
          <span class="tab-label">Infrastructures</span>
          <span class="tab-badge" id="infraBadge">1 139</span>
        </button>
        <button class="nav-tab" data-tab="formations" role="tab" aria-selected="false">
          <span class="tab-icon">🎓</span>
          <span class="tab-label">Formations</span>
          <span class="tab-badge" id="formBadge">87</span>
        </button>
        <button class="nav-tab" data-tab="carte" role="tab" aria-selected="false">
          <span class="tab-icon">🗺</span>
          <span class="tab-label">Carte globale</span>
        </button>
      </nav>

      <!-- Header right actions -->
      <div class="header-actions">
        <a class="btn-admin-link" href="admin/index.html" title="Administration">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Admin</span>
        </a>
        <button class="btn-icon" id="headerSearchBtn" title="Rechercher" aria-label="Rechercher">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="btn-icon hamburger" id="hamburger" title="Menu" aria-label="Ouvrir le menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Mobile nav (bottom of header) -->
    <nav class="mobile-nav" id="mobileNav">
      <button class="mnav-btn active" data-tab="infrastructures">
        <span>🏛</span>
        <span>Infrastructures</span>
      </button>
      <button class="mnav-btn" data-tab="formations">
        <span>🎓</span>
        <span>Formations</span>
      </button>
      <button class="mnav-btn" data-tab="carte">
        <span>🗺</span>
        <span>Carte</span>
      </button>
    </nav>
  </header>

  <!-- ══════════════════════════════════════════
       HERO STATS BAR
  ══════════════════════════════════════════ -->
  <section class="stats-bar" id="statsBar">
    <div class="stats-inner container">
      <div class="stat-card">
        <span class="stat-num" id="sInfra">1 139</span>
        <span class="stat-lbl">Infrastructures</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-card">
        <span class="stat-num" id="sForm">87</span>
        <span class="stat-lbl">Centres de formation</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-card">
        <span class="stat-num">14</span>
        <span class="stat-lbl">Régions couvertes</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-card">
        <span class="stat-num" id="sTypes">9</span>
        <span class="stat-lbl">Types de structures</span>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       MAIN LAYOUT  (sidebar + content)
  ══════════════════════════════════════════ -->
  <div class="app-layout" id="appLayout">

    <!-- ─── FILTER SIDEBAR ─── -->
    <aside class="sidebar" id="sidebar">

      <!-- Search -->
      <div class="filter-block">
        <label class="filter-lbl">Rechercher</label>
        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="searchInput" class="search-input" type="text" placeholder="Nom, commune, localité…" autocomplete="off" />
          <button class="search-clear hidden" id="searchClear" aria-label="Effacer la recherche">✕</button>
        </div>
      </div>

      <!-- Region -->
      <div class="filter-block">
        <label class="filter-lbl" for="regionSelect">Région</label>
        <select id="regionSelect" class="filter-select">
          <option value="">Toutes les régions</option>
        </select>
      </div>

      <!-- Type (Infra only) -->
      <div class="filter-block" id="typeBlock">
        <label class="filter-lbl">Type de structure</label>
        <div class="chips" id="typeChips"></div>
      </div>

      <!-- Branche (Formation only) -->
      <div class="filter-block hidden" id="brancheBlock">
        <label class="filter-lbl">Branche</label>
        <div class="chips" id="brancheChips"></div>
      </div>

      <!-- Milieu (Infra only) -->
      <div class="filter-block" id="milieuBlock">
        <label class="filter-lbl">Milieu</label>
        <div class="pill-group" id="milieuGroup">
          <button class="pill active" data-milieu="">Tous</button>
          <button class="pill" data-milieu="URBAIN">🏙 Urbain</button>
          <button class="pill" data-milieu="RURAL">🌾 Rural</button>
        </div>
      </div>

      <!-- View toggle -->
      <div class="filter-block">
        <label class="filter-lbl">Affichage</label>
        <div class="pill-group">
          <button class="pill view-pill active" data-view="grid" id="sideViewGrid">
            ▦ Grille
          </button>
          <button class="pill view-pill" data-view="map" id="sideViewMap">
            📍 Carte
          </button>
        </div>
      </div>

      <!-- Clear filters -->
      <button class="btn-clear-all" id="clearAll">↺ Réinitialiser les filtres</button>
    </aside>

    <!-- ─── MAIN CONTENT ─── -->
    <main class="main-content" id="mainContent">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="results-txt" id="resultsTxt">Chargement…</span>
          <button class="filter-open-btn" id="filterOpenBtn">
            ⚙ Filtres
          </button>
        </div>
        <div class="toolbar-right">
          <button class="view-sm-btn active" data-view="grid" id="toolViewGrid" title="Grille">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-sm-btn" data-view="map" id="toolViewMap" title="Carte">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
          </button>
        </div>
      </div>

      <!-- Cards grid -->
      <div class="cards-wrapper" id="cardsWrapper">
        <div class="cards-grid" id="cardsGrid">
          <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>Chargement des données…</p>
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>

      <!-- Leaflet map (in-panel) -->
      <div class="panel-map-wrapper hidden" id="panelMapWrapper">
        <div id="panelMap"></div>
        <div class="map-legend" id="panelLegend"></div>
      </div>

    </main>
  </div>

  <!-- ══════════════════════════════════════════
       FULL MAP TAB
  ══════════════════════════════════════════ -->
  <div class="full-map-section hidden" id="fullMapSection">
    <div class="full-map-bar">
      <div class="full-map-search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="fullMapSearch" type="text" placeholder="Rechercher sur la carte…" />
      </div>
      <div class="map-layer-btns" id="layerBtns">
        <button class="layer-btn active" data-layer="all">Tout</button>
        <button class="layer-btn" data-layer="infrastructures">🏛 Infrastructures</button>
        <button class="layer-btn" data-layer="formations">🎓 Formations</button>
      </div>
    </div>
    <div id="fullMap"></div>
    <div class="full-legend" id="fullLegend"></div>

    <!-- ─── ROUTE PANEL ─── -->
    <div class="route-panel hidden" id="routePanel"></div>
  </div>

  <!-- Toast de navigation (global) -->
  <div class="route-toast hidden" id="routeToast"></div>

  <!-- ══════════════════════════════════════════
       MOBILE FILTER DRAWER
  ══════════════════════════════════════════ -->
  <div class="drawer-overlay hidden" id="drawerOverlay"></div>
  <div class="filter-drawer hidden" id="filterDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <h3>Filtres</h3>
      <button class="btn-icon" id="drawerClose" aria-label="Fermer">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <!-- Cloned from sidebar by JS -->
    </div>
    <div class="drawer-foot">
      <button class="btn-primary" id="applyDrawerFilters">Voir les résultats</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       DETAIL MODAL
  ══════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       SCRIPTS
  ══════════════════════════════════════════ -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
