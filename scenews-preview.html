<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scenews — Aperçu Logo</title>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Trebuchet MS', sans-serif;
      color: #f0c040;
      gap: 40px;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    h1 { font-size: 1.1rem; letter-spacing: 6px; opacity: 0.6; margin: 0; text-transform: uppercase; }
    .row {
      display: flex;
      gap: 60px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .label {
      font-size: 0.75rem;
      letter-spacing: 3px;
      opacity: 0.5;
      text-transform: uppercase;
    }
    /* Fond sombre pour simuler écran mobile */
    .on-dark { background: #0a0a0f; padding: 30px; border-radius: 24px; }
    /* Fond clair */
    .on-light { background: #f5f0e8; padding: 30px; border-radius: 24px; }
    img { display: block; }
  </style>
</head>
<body>
  <h1>Scenews — Brand Identity</h1>

  <div class="row">
    <!-- Logo rond sur fond sombre -->
    <div class="card">
      <div class="on-dark">
        <img src="scenews-logo.svg" width="260" height="260" alt="Logo Scenews">
      </div>
      <span class="label">Logo principal — fond sombre</span>
    </div>

    <!-- Logo rond sur fond clair -->
    <div class="card">
      <div class="on-light">
        <img src="scenews-logo.svg" width="260" height="260" alt="Logo Scenews">
      </div>
      <span class="label">Logo principal — fond clair</span>
    </div>
  </div>

  <div class="row">
    <!-- Icône app tailles multiples -->
    <div class="card">
      <div class="on-dark" style="display:flex;gap:20px;align-items:center;">
        <img src="scenews-icon.svg" width="120" height="120" alt="Icon 120">
        <img src="scenews-icon.svg" width="80"  height="80"  alt="Icon 80">
        <img src="scenews-icon.svg" width="48"  height="48"  alt="Icon 48">
        <img src="scenews-icon.svg" width="32"  height="32"  alt="Icon 32">
      </div>
      <span class="label">Icône app — tailles multiples (120 / 80 / 48 / 32 px)</span>
    </div>
  </div>

  <!-- Palette couleurs -->
  <div class="row" style="gap:12px;">
    <div style="width:44px;height:44px;border-radius:50%;background:#1e7a46;border:2px solid #f0c04066;title:'Vert primaire'"></div>
    <div style="width:44px;height:44px;border-radius:50%;background:#0c3b1e;border:2px solid #f0c04066;"></div>
    <div style="width:44px;height:44px;border-radius:50%;background:#f5cc50;border:2px solid #f0c04066;"></div>
    <div style="width:44px;height:44px;border-radius:50%;background:#c8880a;border:2px solid #f0c04066;"></div>
    <div style="width:44px;height:44px;border-radius:50%;background:#d63228;border:2px solid #f0c04066;"></div>
    <div style="width:44px;height:44px;border-radius:50%;background:#f5f0e8;border:2px solid #f0c04066;"></div>
  </div>
  <span class="label" style="margin-top:-24px;">Palette — Vert sénégalais · Or · Rouge · Ivoire</span>
</body>
</html>
