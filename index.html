<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scenews — Carte des Infrastructures Culturelles</title>
  <meta name="description"
    content="Explorez les infrastructures culturelles et centres de formation aux arts et métiers du Sénégal" />
  <meta name="theme-color" content="#172331" />

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="header" id="header">
    <div class="header-inner container">
      <!-- Logo -->
      <a class="logo" href="#">
        <img src="img/scenews-brand-logo.png" alt="Scenews" style="height: 32px;" />
        <div class="logo-text">
          <span class="logo-title" style="display: none;">Scenews</span>
          <span class="logo-sub">Carte Culturelle Nationale</span>
        </div>
      </a>

      <!-- Desktop nav tabs -->
      <nav class="nav-tabs" id="navTabs" role="tablist">
        <button class="nav-tab" data-tab="infrastructures" role="tab" aria-selected="false">
          <span class="tab-icon">🏛</span>
          <span class="tab-label">Infrastructures</span>
          <span class="tab-badge" id="infraBadge">1 139</span>
        </button>
        <button class="nav-tab active" data-tab="carte" role="tab" aria-selected="true">
          <span class="tab-icon">🗺</span>
          <span class="tab-label">Carte globale</span>
        </button>
      </nav>

      <!-- Header right actions -->
      <div class="header-actions">
        <a class="btn-admin-link" href="admin/index.html" title="Administration">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
          </svg>
          <span>Admin</span>
        </a>
        <button class="btn-icon" id="headerSearchBtn" title="Rechercher" aria-label="Rechercher">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
        <button class="btn-icon hamburger" id="hamburger" title="Menu" aria-label="Ouvrir le menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile nav (bottom of header) -->
    <nav class="mobile-nav" id="mobileNav">
      <button class="mnav-btn" data-tab="infrastructures">
        <span>🏛</span>
        <span>Infrastructures</span>
      </button>
      <button class="mnav-btn active" data-tab="carte">
        <span>
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z" />
          </svg>
        </span>
        <span>Carte</span>
      </button>
    </nav>
  </header>

  <!-- ══════════════════════════════════════════
       HERO STATS BAR
  ══════════════════════════════════════════ -->
  <section class="stats-bar" id="statsBar">
    <div class="stats-inner container">
      <div class="stat-card">
        <span class="stat-num" id="sInfra">1 139</span>
        <span class="stat-lbl">Infrastructures</span>
      </div>

    </div>
  </section>

  <!-- ══════════════════════════════════════════
       MAIN LAYOUT  (sidebar + content)
  ══════════════════════════════════════════ -->
  <div class="app-layout" id="appLayout">

    <!-- ─── FILTER SIDEBAR ─── -->
    <aside class="sidebar" id="sidebar">

      <!-- Search -->
      <div class="filter-block">
        <label class="filter-lbl">Rechercher</label>
        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
            stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input id="searchInput" class="search-input" type="text" placeholder="Nom, commune, localité…"
            autocomplete="off" />
          <button class="search-clear hidden" id="searchClear" aria-label="Effacer la recherche">✕</button>
        </div>
      </div>

      <!-- Region -->
      <div class="filter-block">
        <label class="filter-lbl" for="regionSelect">Région</label>
        <select id="regionSelect" class="filter-select">
          <option value="">Toutes les régions</option>
        </select>
      </div>

      <!-- Type (Infra only) -->
      <div class="filter-block" id="typeBlock">
        <label class="filter-lbl">Type de structure</label>
        <div class="chips" id="typeChips"></div>
      </div>

      <!-- Branche (Formation only) -->
      <div class="filter-block hidden" id="brancheBlock">
        <label class="filter-lbl">Branche</label>
        <div class="chips" id="brancheChips"></div>
      </div>

      <!-- Milieu (Infra only) -->
      <div class="filter-block" id="milieuBlock">
        <label class="filter-lbl">Milieu</label>
        <div class="pill-group" id="milieuGroup">
          <button class="pill active" data-milieu="">Tous</button>
          <button class="pill" data-milieu="URBAIN">🏙 Urbain</button>
          <button class="pill" data-milieu="RURAL">🌾 Rural</button>
        </div>
      </div>

      <!-- View toggle -->
      <div class="filter-block">
        <label class="filter-lbl">Affichage</label>
        <div class="pill-group">
          <button class="pill view-pill active" data-view="grid" id="sideViewGrid">
            ▦ Grille
          </button>
          <button class="pill view-pill" data-view="map" id="sideViewMap">
            📍 Carte
          </button>
        </div>
      </div>

      <!-- Clear filters -->
      <button class="btn-clear-all" id="clearAll">↺ Réinitialiser les filtres</button>
    </aside>

    <!-- ─── MAIN CONTENT ─── -->
    <main class="main-content" id="mainContent">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="results-txt" id="resultsTxt">Chargement…</span>
          <button class="filter-open-btn" id="filterOpenBtn">
            ⚙ Filtres
          </button>
        </div>
        <div class="toolbar-right">
          <button class="view-sm-btn active" data-view="grid" id="toolViewGrid" title="Grille">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
          </button>
          <button class="view-sm-btn" data-view="map" id="toolViewMap" title="Carte">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="2" viewBox="0 0 24 24">
              <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" />
              <line x1="8" y1="2" x2="8" y2="18" />
              <line x1="16" y1="6" x2="16" y2="22" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Cards grid -->
      <div class="cards-wrapper" id="cardsWrapper">
        <div class="cards-grid" id="cardsGrid">
          <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>Chargement des données…</p>
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>

      <!-- Leaflet map (in-panel) -->
      <div class="panel-map-wrapper hidden" id="panelMapWrapper">
        <div id="panelMap"></div>
        <div class="map-legend" id="panelLegend"></div>
      </div>

    </main>
  </div>

  <!-- ══════════════════════════════════════════
       FULL MAP TAB
  ══════════════════════════════════════════ -->
  <div class="full-map-section hidden" id="fullMapSection">
    <div id="fullMap"></div>

    <div class="full-map-bar">
      <div
        style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 8px; opacity: 0.7;">
        ✨ Scenews AI Guide
      </div>
      <div class="chatbot-container" id="chatbotContainer">
        <!-- Initial Bot Message -->
        <div class="chatbot-bubble" id="botWelcome">
          <div class="bot-avatar">🎭</div>
          <div class="bot-msg">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
              <span>Bonjour ! Je suis votre guide culturel.</span>
              <button onclick="speakWelcome()"
                style="background:none; border:none; cursor:pointer; font-size:18px; padding:0 5px;"
                title="Écouter le message">🔊</button>
            </div>
            <b>Que souhaitez-vous découvrir au Sénégal aujourd'hui ?</b>
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
              <button class="chip"
                onclick="document.getElementById('fullMapSearch').value='Musées à Dakar'; document.getElementById('fullMapSearch').dispatchEvent(new Event('input'))"
                style="font-size:11px; padding:4px 10px; cursor:pointer; background:rgba(10,37,64,0.05); border:1px solid rgba(10,37,64,0.1); border-radius:20px;">🏛
                Musées</button>
              <button class="chip"
                onclick="document.getElementById('fullMapSearch').value='Cinémas'; document.getElementById('fullMapSearch').dispatchEvent(new Event('input'))"
                style="font-size:11px; padding:4px 10px; cursor:pointer; background:rgba(10,37,64,0.05); border:1px solid rgba(10,37,64,0.1); border-radius:20px;">🎬
                Cinémas</button>
              <button class="chip"
                onclick="document.getElementById('fullMapSearch').value='Galeries d\'art'; document.getElementById('fullMapSearch').dispatchEvent(new Event('input'))"
                style="font-size:11px; padding:4px 10px; cursor:pointer; background:rgba(10,37,64,0.05); border:1px solid rgba(10,37,64,0.1); border-radius:20px;">🖼
                Galeries</button>
              <button class="chip"
                onclick="document.getElementById('fullMapSearch').value='Centres culturels'; document.getElementById('fullMapSearch').dispatchEvent(new Event('input'))"
                style="font-size:11px; padding:4px 10px; cursor:pointer; background:rgba(10,37,64,0.05); border:1px solid rgba(10,37,64,0.1); border-radius:20px;">🎭
                Centres</button>
              <button class="chip"
                onclick="document.getElementById('fullMapSearch').value='Artisanat'; document.getElementById('fullMapSearch').dispatchEvent(new Event('input'))"
                style="font-size:11px; padding:4px 10px; cursor:pointer; background:rgba(10,37,64,0.05); border:1px solid rgba(10,37,64,0.1); border-radius:20px;">🧵
                Artisanat</button>
            </div>
          </div>
        </div>
      </div>

      <div class="full-map-search-row">
        <button class="layer-btn" onclick="setTab('infrastructures')"
          style="padding: 8px; min-width: auto; border-radius: 50%; width: 40px; height: 40px;">←</button>
        <div class="full-map-search-wrap">
          <input id="fullMapSearch" type="search" placeholder="Posez-moi votre question ici..." autocomplete="off" />
          <button id="fullMapClear" class="fms-clear hidden">✕</button>
        </div>
      </div>
      <div id="nlpInterpret" class="nlp-interpret hidden" style="padding: 0 10px 0 52px;"></div>
    </div>

    <div class="map-layer-btns" id="layerBtns">
      <button class="layer-btn active" data-layer="all">Tout</button>
      <button class="layer-btn" data-layer="infrastructures">🏛 Infrastructures</button>
    </div>
    <div class="full-legend" id="fullLegend">
      <div class="legend-handle" id="fullLegendHandle"></div>
      <div class="legend-list" id="fullLegendList"></div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════
       MOBILE FILTER DRAWER
  ══════════════════════════════════════════ -->
  <div class="drawer-overlay hidden" id="drawerOverlay"></div>
  <div class="filter-drawer hidden" id="filterDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <h3>Filtres</h3>
      <button class="btn-icon" id="drawerClose" aria-label="Fermer">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <!-- Cloned from sidebar by JS -->
    </div>
    <div class="drawer-foot">
      <button class="btn-primary" id="applyDrawerFilters">Voir les résultats</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       DETAIL MODAL
  ══════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       SCRIPTS
  ══════════════════════════════════════════ -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
