<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#237a4a"/>
      <stop offset="100%" stop-color="#0c3b1e"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5cc50"/>
      <stop offset="100%" stop-color="#c8880a"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="60%" stop-color="#f0b830"/>
      <stop offset="100%" stop-color="#c07a08"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8880a"/>
      <stop offset="50%" stop-color="#f5cc50"/>
      <stop offset="100%" stop-color="#c8880a"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#f5cc50" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="210" cy="210" r="188"/>
    </clipPath>
  </defs>

  <!-- === FOND + OMBRE === -->
  <circle cx="210" cy="210" r="196" fill="#061810" filter="url(#shadow)"/>
  <circle cx="210" cy="210" r="188" fill="url(#bgGrad)"/>

  <!-- === MOTIF GÉOMÉTRIQUE WAX (fond déco) === -->
  <g clip-path="url(#circleClip)" opacity="0.06">
    <path d="M10 210 L210 10 L410 210 L210 410 Z" fill="none" stroke="#f5cc50" stroke-width="1.5"/>
    <path d="M55 210 L210 55 L365 210 L210 365 Z" fill="none" stroke="#f5cc50" stroke-width="1.2"/>
    <path d="M100 210 L210 100 L320 210 L210 320 Z" fill="none" stroke="#f5cc50" stroke-width="1"/>
    <line x1="10" y1="110" x2="410" y2="110" stroke="#f5cc50" stroke-width="0.8"/>
    <line x1="10" y1="310" x2="410" y2="310" stroke="#f5cc50" stroke-width="0.8"/>
    <line x1="110" y1="10" x2="110" y2="410" stroke="#f5cc50" stroke-width="0.8"/>
    <line x1="310" y1="10" x2="310" y2="410" stroke="#f5cc50" stroke-width="0.8"/>
  </g>

  <!-- === SOLEIL / HALO HAUT === -->
  <circle cx="210" cy="148" r="62" fill="#1a6b3e" opacity="0.35"/>
  <circle cx="210" cy="148" r="50" fill="#1e7a46" opacity="0.25"/>

  <!-- === BAOBAB === -->
  <g transform="translate(210, 192)">

    <!-- Racines latérales -->
    <path d="M-16 52 Q-34 64 -48 60" fill="none" stroke="url(#trunkGrad)" stroke-width="6" stroke-linecap="round"/>
    <path d="M16 52 Q34 64 48 60" fill="none" stroke="url(#trunkGrad)" stroke-width="6" stroke-linecap="round"/>
    <path d="M-8 56 Q-14 72 -18 78" fill="none" stroke="url(#trunkGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M8 56 Q14 72 18 78" fill="none" stroke="url(#trunkGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M0 58 Q0 74 0 82" fill="none" stroke="url(#trunkGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Tronc principal -->
    <path d="M-15 56 Q-17 28 -13 0 L13 0 Q17 28 15 56 Z" fill="url(#trunkGrad)" rx="6"/>

    <!-- Branches hautes -->
    <path d="M-13 10 Q-40 0 -55 -12" fill="none" stroke="url(#trunkGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M13 10 Q40 0 55 -12" fill="none" stroke="url(#trunkGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-8 2 Q-22 -18 -28 -34" fill="none" stroke="url(#trunkGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M8 2 Q22 -18 28 -34" fill="none" stroke="url(#trunkGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 0 Q0 -22 0 -38" fill="none" stroke="url(#trunkGrad)" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Couronne principale (silhouette ronde caractéristique) -->
    <ellipse cx="0" cy="-22" rx="78" ry="54" fill="#1b6e3a"/>
    <!-- Sous-couronnes pour volume -->
    <ellipse cx="-40" cy="-30" rx="38" ry="28" fill="#218a47" opacity="0.85"/>
    <ellipse cx="40" cy="-30" rx="38" ry="28" fill="#218a47" opacity="0.85"/>
    <ellipse cx="0" cy="-52" rx="30" ry="22" fill="#259052" opacity="0.9"/>
    <ellipse cx="-60" cy="-12" rx="22" ry="18" fill="#1a6035" opacity="0.75"/>
    <ellipse cx="60" cy="-12" rx="22" ry="18" fill="#1a6035" opacity="0.75"/>
    <!-- Contour couronne doré -->
    <ellipse cx="0" cy="-22" rx="78" ry="54" fill="none" stroke="url(#goldGrad)" stroke-width="1.8" opacity="0.5"/>

    <!-- Étoile dorée (drapeau Sénégal) centrée dans la couronne -->
    <g transform="translate(0,-24)">
      <polygon points="0,-16 3.8,-6 14.5,-6 6,1.5 9.7,12.5 0,5.5 -9.7,12.5 -6,1.5 -14.5,-6 -3.8,-6"
               fill="url(#goldGrad)" stroke="#a06008" stroke-width="0.6"/>
    </g>
  </g>

  <!-- === SÉPARATEUR LIGNE ORE === -->
  <line x1="60" y1="315" x2="360" y2="315" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- === BANDE TRICOLORE DRAPEAU === -->
  <g clip-path="url(#circleClip)">
    <rect x="22"  y="322" width="124" height="9" rx="1" fill="#1e7a46" opacity="0.85"/>
    <rect x="148" y="322" width="124" height="9" rx="1" fill="#f0c040" opacity="0.85"/>
    <rect x="274" y="322" width="124" height="9" rx="1" fill="#d63228" opacity="0.85"/>
  </g>

  <!-- === NOM SCENEWS === -->
  <!-- Ombre -->
  <text x="212" y="308" text-anchor="middle"
        font-family="'Trebuchet MS','Gill Sans MT','Franklin Gothic Medium',sans-serif"
        font-size="58" font-weight="900" letter-spacing="4"
        fill="#000000" opacity="0.35">SCENEWS</text>
  <!-- Texte principal avec glow -->
  <text x="210" y="305" text-anchor="middle"
        font-family="'Trebuchet MS','Gill Sans MT','Franklin Gothic Medium',sans-serif"
        font-size="58" font-weight="900" letter-spacing="4"
        fill="url(#goldText)" filter="url(#textGlow)">SCENEWS</text>

  <!-- === SOUS-TITRE === -->
  <text x="210" y="346" text-anchor="middle"
        font-family="'Trebuchet MS','Gill Sans MT',sans-serif"
        font-size="13.5" font-weight="500" letter-spacing="5.5"
        fill="#9ecfb5" opacity="0.88">CULTURE SÉNÉGAL</text>

  <!-- === DÉCO ARC HAUT === -->
  <path d="M 46 148 A 172 172 0 0 1 374 148"
        fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.35"/>

  <!-- === PETITES ÉTOILES DÉCORATIVES === -->
  <circle cx="78" cy="172" r="2.5" fill="#f5cc50" opacity="0.55"/>
  <circle cx="342" cy="172" r="2.5" fill="#f5cc50" opacity="0.55"/>
  <circle cx="210" cy="30" r="3" fill="#f5cc50" opacity="0.6"/>

  <!-- === BORDURE DORÉE === -->
  <circle cx="210" cy="210" r="188" fill="none" stroke="url(#goldGrad)" stroke-width="3.5" opacity="0.6"/>
  <circle cx="210" cy="210" r="182" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2"/>

  <!-- Points cardinaux -->
  <circle cx="210" cy="23" r="4.5" fill="url(#goldGrad)" opacity="0.9"/>
  <circle cx="397" cy="210" r="4.5" fill="url(#goldGrad)" opacity="0.9"/>
  <circle cx="23"  cy="210" r="4.5" fill="url(#goldGrad)" opacity="0.9"/>
  <circle cx="210" cy="397" r="4.5" fill="url(#goldGrad)" opacity="0.9"/>
</svg>
